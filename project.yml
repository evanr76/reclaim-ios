name: ReclaimIOS
options:
  bundleIdPrefix: io.github.evanr76
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "2WC59DQ552"
    CODE_SIGN_STYLE: Automatic

targets:
  # Shared model + networking layer (static -> linked into app and widget,
  # no embedding/rpath concerns).
  ReclaimKit:
    type: library.static
    platform: iOS
    sources: [ReclaimKit]
    settings:
      base:
        PRODUCT_MODULE_NAME: ReclaimKit
        SKIP_INSTALL: YES

  ReclaimIOS:
    type: application
    platform: iOS
    sources: [ReclaimIOS]
    dependencies:
      - target: ReclaimKit
      - target: ReclaimWidget
      - target: ReclaimWatch
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.evanr76.reclaimios
        CODE_SIGN_ENTITLEMENTS: ReclaimIOS/ReclaimIOS.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Reclaim
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_NSSupportsLiveActivities: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

  ReclaimWidget:
    type: app-extension
    platform: iOS
    sources: [ReclaimWidget]
    dependencies:
      - target: ReclaimKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.evanr76.reclaimios.widget
        CODE_SIGN_ENTITLEMENTS: ReclaimWidget/ReclaimWidget.entitlements
    info:
      path: ReclaimWidget/Info.plist
      properties:
        CFBundleDisplayName: Reclaim
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  # watchOS companion app (single-target, modern). Compiles the shared ReclaimKit
  # sources directly (guarded #if for iOS-only bits like ActivityKit).
  ReclaimWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources: [ReclaimWatch, ReclaimKit]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.evanr76.reclaimios.watchkitapp
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Reclaim
        INFOPLIST_KEY_WKApplication: YES
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: io.github.evanr76.reclaimios
